<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMAF</title>

    <link rel="stylesheet" href="../UI/pmaf.css">
    <link rel="stylesheet" href="../UI/style.css">

</head>

<body>

    <header>
        <img src="./Images/CEVA logo Ecat iD campus-white.png" alt="Logo Ceva" class="logo-left">

        <h1>PMAF</h1>
        <p>Page dédiée à la documentation et aux ressources PMAF</p>
    </header>

    <nav class="breadcrumb">
        <a href="../index.html">Accueil</a>
        <span>›</span>
        <span>PMAF</span>
    </nav>

    <main>

        <!-- ONGLET -->

        <nav class="tabs">
            <button class="tab-btn active" data-tab="defauts">Défauts</button>
            <button class="tab-btn" data-tab="documentation">Documentation</button>
        </nav>

        <!-- DEFAUTS -->

        <section id="defauts" class="tab-content active">

            <h2>Défauts PMAF</h2>

            <input
                type="text"
                id="searchInput"
                placeholder="Rechercher un défaut PMAF..."
            >

            <div id="results"></div>

        </section>

        <!-- DOCUMENTATION -->

        <section id="documentation" class="tab-content">

            <h2>Documentation</h2>

            <p>
                Documents techniques associés à la machine PMAF.
            </p>

        </section>


        <div id="popupDefaut" class="popup-overlay">
            <div class="popup-content">
                <button class="popup-close" onclick="fermerPopupDefaut()">×</button>

                <h2 id="popupTitle"></h2>

                <p>
                    <strong>TYPE :</strong>
                    <span id="popupType"></span>
                </p>

                <p>
                    <strong>CAUSE :</strong><br>
                    <span id="popupCause"></span>
                </p>

                <p>
                    <strong>SOLUTION :</strong><br>
                    <span id="popupSolution"></span>
                </p>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 - Documentation interne PMAF</p>
    </footer>

    <script src="../script/pmaf.js"></script>

</body>

</html>
